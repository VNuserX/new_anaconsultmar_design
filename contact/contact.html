<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us – ANAConsultmar</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/font-awesome/css/all.min.css" />

  <!-- Shared stylesheets (Going up one directory to find the css folder) -->
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/light-theme.css" />
<script>
  (function() {
    var base = (window.SITE_CONFIG && window.SITE_CONFIG.base) || '';
    var link = document.createElement('link');
    link.rel = 'icon';
    link.href = base + '/assets/images/favicon.jpg';
    document.head.appendChild(link);
  })();
</script>
</head>
<body data-page="contact">

  <!-- Particles -->
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>

  <!-- Dynamic Header Placeholder (Replaces the old hardcoded header/mobile overlay blocks) -->
  <div id="header-placeholder"></div>

  <!-- Page banner -->
  <section class="page-banner">
    <div class="banner-bg"></div>
    <div class="container">
      <h1>Contact Us</h1>
      <div class="breadcrumb"><a href="../index.html">Home</a> / Contact Us</div>
    </div>
  </section>

  <!-- Contact content -->
  <section class="contact-section">
    <div class="container">
      <div class="contact-grid">
        <!-- Details column -->
        <div class="contact-details reveal">
          <h3><i class="fas fa-map-pin"></i> Get in Touch</h3>

          <div class="detail-item">
            <i class="fas fa-building"></i>
            <div>
              <span class="label">Company</span>
              <div class="value"><strong>ANAConsultmar, SIA</strong></div>
            </div>
          </div>

          <div class="detail-item">
            <i class="fas fa-id-card"></i>
            <div>
              <span class="label">Registration Number</span>
              <div class="value">40203167893</div>
            </div>
          </div>

          <div class="detail-item">
            <i class="fas fa-map-marker-alt"></i>
            <div>
              <span class="label">Legal Address</span>
              <div class="value">15/2 Ieriku Street, Riga, Latvia, LV-1084</div>
            </div>
          </div>

          <div class="detail-item">
            <i class="fas fa-location-dot"></i>
            <div>
              <span class="label">Actual Address</span>
              <div class="value" id="contactAddress">31 Cēsu Street, k-3, Nr.32-8, Riga, Latvia, LV-1012</div>
            </div>
          </div>

          <div class="detail-item">
            <i class="fas fa-phone"></i>
            <div>
              <span class="label">Phone</span>
              <div class="value"><a href="tel:+37126545239" id="contactPhoneLink"><span id="contactPhone">+371 26545239</span></a></div>
            </div>
          </div>

          <div class="detail-item">
            <i class="fas fa-envelope"></i>
            <div>
              <span class="label">Email</span>
              <div class="value"><a href="mailto:info@anaconsultmar.com" id="contactEmailLink"><span id="contactEmail">info@anaconsultmar.com</span></a></div>
            </div>
          </div>

          <div class="social-links">
            <a href="https://www.facebook.com/anaconsultmar" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="mailto:info@anaconsultmar.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
            <a href="tel:+37126545239" aria-label="Phone"><i class="fas fa-phone"></i></a>
          </div>
        </div>

        <!-- Photo column -->
        <div class="contact-photo reveal">
          <img src="/assets/images/contact/office.jpg" alt="ANAConsultmar office" loading="lazy" />
        </div>
      </div>   <!-- end contact-grid -->
    </div>     <!-- end container -->

    <!-- Map – full width, outside the container -->
    <div class="contact-map reveal">
      <div class="container">
        <iframe loading="lazy"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2175.614923231261!2d24.1414288!3d56.9672713!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x46eece4b575f4821%3A0xa29bb47a6c66baf!2sC%C4%93su%20iela%2031%20K-3%2C%20Vidzemes%20priek%C5%A1pils%C4%93ta%2C%20R%C4%ABga%2C%20LV-1012!5e0!3m2!1sen!2slv!4v1696000000000!5m2!1sen!2slv"
          width="100%" height="300" style="border:0;" allowfullscreen=""
          referrerpolicy="no-referrer-when-downgrade"
          title="Google Maps – ANAConsultmar office location"></iframe>
      </div>
    </div>
  </section>

  <!-- Dynamic Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Shared configuration, injection logic, and interactive mechanics -->
  <script src="../js/config.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/components.js"></script>
</body>
</html>
